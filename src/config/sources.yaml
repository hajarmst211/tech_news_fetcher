  - name: "GitHub (dotnet)"
    type: "api"
    method: "GET"
    base_url: "https://api.github.com"
    endpoint: "/search/repositories"
    github_enrich: true
    headers:
      Accept: "application/json"
    params:
      q: "dotnet"
      sort: "created"
      order: "desc"
      per_page: 5

