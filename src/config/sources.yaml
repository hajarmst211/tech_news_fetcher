  - name: "National Vulnerability Database (SSH)"
    type: "api"
    method: "GET"
    base_url: "https://services.nvd.nist.gov"
    endpoint: "/rest/json/cves/2.0"
    cve_simplify: true
    headers:
      Accept: "application/json"
    params:
      keywordSearch: "SSH"
      resultsPerPage: 20
    env_api_key: "NVD_API_KEY"

