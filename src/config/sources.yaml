  - name: "Dev.to (.NET)"
    type: "api"
    method: "GET"
    base_url: "https://dev.to"
    endpoint: "/api/articles"
    headers:
      Accept: "application/json"
    params:
      tag: "dotnet"
      per_page: 10
    fetch_full_content: true

