  - name: "Hacker News (New Stories)"
    type: "api"
    hn_id_list: true
    method: "GET"
    base_url: "https://hacker-news.firebaseio.com"
    endpoint: "/v0/newstories.json"
    headers:
      Accept: "application/json"
    params:
      print: "pretty"
    note: "Returns IDs. The code will fetch details for the top stories."

  - name: "Hacker News (Item Detail)"
    type: "api"
    hn_item_fetch: true
    method: "GET"
    base_url: "https://hacker-news.firebaseio.com"
    endpoint: "/v0/item/{item_id}.json"
    headers:
      Accept: "application/json"

