  - name: "ArXiv (AI)"
    type: "api"
    method: "GET"
    base_url: "http://export.arxiv.org"
    endpoint: "/api/query"
    headers:
      Accept: "application/xml"
    params:
      search_query: "cat:cs.AI"
      sortBy: "submittedDate"
      sortOrder: "descending"
      max_results: 10
    response_type: "xml"

  - name: "ArXiv (Machine Learning)"
    type: "api"
    method: "GET"
    base_url: "http://export.arxiv.org"
    endpoint: "/api/query"
    headers:
      Accept: "application/xml"
    params:
      search_query: "cat:cs.LG"
      sortBy: "submittedDate"
      sortOrder: "descending"
      max_results: 10
    response_type: "xml"

  - name: "ArXiv (Networks)"
